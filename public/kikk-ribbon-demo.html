<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KIKK Festival Ribbon Trail Demo</title>
  <style>
    /* Base e Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: #FCFCFC; /* Cor de fundo branca premium do site */
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: none; /* Oculta cursor padrão */
    }

    /* O Canvas que cuidará do Ribbon Trail */
    #ribbon-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none; /* Não bloqueia cliques */
      z-index: 9999;
    }

    /* Elementos de teste para ver o rastro em ação sobre algo */
    .demo-content {
      text-align: center;
      position: relative;
      z-index: 10;
      user-select: none;
    }

    .huge-text {
      font-size: clamp(4rem, 10vw, 8rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      color: #1a1a1a;
    }
    
    .subtitle {
      margin-top: 1rem;
      font-size: 1.5rem;
      color: #666666;
      font-weight: 500;
    }

    /* Fallback para dispositivos touch (restaura o cursor) */
    @media (pointer: coarse) {
      body {
        cursor: auto;
      }
      #ribbon-canvas {
        display: none;
      }
    }
  </style>
</head>
<body>

  <!-- Elemento Canvas para o Ribbon Trail -->
  <canvas id="ribbon-canvas"></canvas>

  <div class="demo-content">
    <h1 class="huge-text">Organic<br>Ribbon</h1>
    <p class="subtitle">Desliza o rato para ver a magia</p>
  </div>

  <script>
    // 1. Verificação de Touch (Ignorar setup pesado no mobile)
    const isTouchDevice = window.matchMedia("(pointer: coarse)").matches;

    if (!isTouchDevice) {
      const canvas = document.getElementById('ribbon-canvas');
      const ctx = canvas.getContext('2d');

      // 2. Variáveis de Configuração do Rastro
      let width, height;
      const numPoints = 40; // Comprimento da cauda
      const points = [];
      const mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
      
      // Paleta do teu site Premium Light Mode
      // Usamos RGB para misturar transparências de forma dinâmica
      const colors = {
        sage: { r: 123, g: 160, b: 130 }, // #7BA082
        sky: { r: 163, g: 206, b: 241 }   // #A3CEF1
      };

      // Inicializa Array de pontos
      class Point {
        constructor(x, y) {
          this.x = x;
          this.y = y;
          this.vx = 0; // Velocidade em X
          this.vy = 0; // Velocidade em Y
        }
      }

      for (let i = 0; i < numPoints; i++) {
        points.push(new Point(mouse.x, mouse.y));
      }

      // Atualizar as dimensões do Canvas e considerar DPI (High-Res screens)
      const resize = () => {
        width = window.innerWidth;
        height = window.innerHeight;
        // Retina scaling
        const dpr = window.devicePixelRatio || 1;
        canvas.width = width * dpr;
        canvas.height = height * dpr;
        ctx.scale(dpr, dpr);
      };
      
      window.addEventListener('resize', resize);
      resize();

      // Gravar a posição real do rato
      window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });

      // 3. O Loop Matemático do Rastro
      const render = () => {
        // Limpar o canvas a cada frame
        ctx.clearRect(0, 0, width, height);

        // O primeiro ponto segue exatamente o rato
        points[0].x = mouse.x;
        points[0].y = mouse.y;

        // Física: Os restantes pontos seguem o anterior como elásticos ligados em cadeia
        for (let i = 1; i < numPoints; i++) {
          const pt = points[i];
          const prevPt = points[i - 1];
          
          // Distância para o ponto que deve seguir
          const dx = prevPt.x - pt.x;
          const dy = prevPt.y - pt.y;
          
          // Aceleração baseada na distância
          pt.vx += dx * 0.45;
          pt.vy += dy * 0.45;
          
          // Fricção para suavizar a inércia (Damping)
          pt.vx *= 0.55;
          pt.vy *= 0.55;
          
          pt.x += pt.vx;
          pt.y += pt.vy;
        }

        // 4. Desenhar a Fita Fluída (Ribbon) usando as Normais Perpendiculares
        // Isso cria polígonos preenchidos para dar a forma de fita e não apenas uma linha
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        
        // Efeito de Overlap (Multiply) cria mistura de aquarela no canvas
        ctx.globalCompositeOperation = 'multiply';

        for (let i = 1; i < numPoints - 1; i++) {
          const pt = points[i];
          const nextPt = points[i + 1];
          const prevPt = points[i - 1];

          // Curvas de Beziér para ligar os pontos de forma orgânica
          const xc = (pt.x + nextPt.x) / 2;
          const yc = (pt.y + nextPt.y) / 2;

          // Calcular Espessura (Tapering) baseada no índice: mais grossa na cabeça (0) e afina até à cauda
          const life = 1 - (i / numPoints);
          const thickness = life * 45; // Máx. 45px de espessura

          // Transição de Cor Gradual no array de pontos: de Sage Green para Sky Blue
          // Calculando mistura Linear (LERP) das cores RGB
          const r = Math.round(colors.sage.r + (colors.sky.r - colors.sage.r) * (1 - life));
          const g = Math.round(colors.sage.g + (colors.sky.g - colors.sage.g) * (1 - life));
          const b = Math.round(colors.sage.b + (colors.sky.b - colors.sage.b) * (1 - life));
          
          // Transparência (alpha) para desaparecer suavemente no fim do rastro
          const alpha = life * 0.7;

          ctx.beginPath();
          ctx.moveTo(prevPt.x, prevPt.y);
          ctx.quadraticCurveTo(pt.x, pt.y, xc, yc);
          ctx.lineWidth = thickness;
          ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
          ctx.stroke();
        }

        requestAnimationFrame(render);
      };
      
      requestAnimationFrame(render);
    }
  </script>
</body>
</html>
